name: Build Push and Deploy ECS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - local
          - stage
          - production
      image_tag:
        description: "Immutable image tag (for example: git sha)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30

    outputs:
      frontend_image: ${{ steps.images.outputs.frontend_image }}
      backend_image: ${{ steps.images.outputs.backend_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image names
        id: images
        run: |
          echo "frontend_image=${{ vars.ECR_FRONTEND_REPOSITORY }}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ vars.ECR_BACKEND_REPOSITORY }}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        run: |
          set -euo pipefail
          docker build -f Dockerfile.frontend -t "${{ steps.images.outputs.frontend_image }}" .
          docker push "${{ steps.images.outputs.frontend_image }}"

      - name: Build and push backend image
        run: |
          set -euo pipefail
          docker build -f Dockerfile.backend -t "${{ steps.images.outputs.backend_image }}" .
          docker push "${{ steps.images.outputs.backend_image }}"

  deploy-ecs:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment }}-approval
    timeout-minutes: 30

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Register frontend task definition revision
        run: |
          set -euo pipefail
          CURRENT_TD_ARN=$(aws ecs describe-services \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --services "${{ vars.ECS_FRONTEND_SERVICE_NAME }}" \
            --query 'services[0].taskDefinition' --output text)
          echo "PREVIOUS_FRONTEND_TD_ARN=$CURRENT_TD_ARN" >> "$GITHUB_ENV"

          aws ecs describe-task-definition --task-definition "$CURRENT_TD_ARN" --query 'taskDefinition' > frontend-taskdef.json

          jq --arg IMAGE "${{ needs.build-and-push.outputs.frontend_image }}" '
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
            | .containerDefinitions = (.containerDefinitions | map(if .name == "frontend" then .image = $IMAGE else . end))
          ' frontend-taskdef.json > frontend-taskdef-updated.json

          NEW_TD_ARN=$(aws ecs register-task-definition --cli-input-json file://frontend-taskdef-updated.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "NEW_FRONTEND_TD_ARN=$NEW_TD_ARN" >> "$GITHUB_ENV"

          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --service "${{ vars.ECS_FRONTEND_SERVICE_NAME }}" \
            --task-definition "$NEW_TD_ARN"

      - name: Register backend task definition revision
        run: |
          set -euo pipefail
          CURRENT_TD_ARN=$(aws ecs describe-services \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --services "${{ vars.ECS_BACKEND_SERVICE_NAME }}" \
            --query 'services[0].taskDefinition' --output text)
          echo "PREVIOUS_BACKEND_TD_ARN=$CURRENT_TD_ARN" >> "$GITHUB_ENV"

          aws ecs describe-task-definition --task-definition "$CURRENT_TD_ARN" --query 'taskDefinition' > backend-taskdef.json

          jq --arg IMAGE "${{ needs.build-and-push.outputs.backend_image }}" '
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
            | .containerDefinitions = (.containerDefinitions | map(if .name == "backend" then .image = $IMAGE else . end))
          ' backend-taskdef.json > backend-taskdef-updated.json

          NEW_TD_ARN=$(aws ecs register-task-definition --cli-input-json file://backend-taskdef-updated.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "NEW_BACKEND_TD_ARN=$NEW_TD_ARN" >> "$GITHUB_ENV"

          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --service "${{ vars.ECS_BACKEND_SERVICE_NAME }}" \
            --task-definition "$NEW_TD_ARN"

      - name: Wait for stable services
        id: wait_stable
        continue-on-error: true
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --services "${{ vars.ECS_FRONTEND_SERVICE_NAME }}" "${{ vars.ECS_BACKEND_SERVICE_NAME }}"

      - name: Roll back ECS services on failed stabilization
        if: steps.wait_stable.outcome == 'failure'
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --service "${{ vars.ECS_FRONTEND_SERVICE_NAME }}" \
            --task-definition "$PREVIOUS_FRONTEND_TD_ARN"

          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --service "${{ vars.ECS_BACKEND_SERVICE_NAME }}" \
            --task-definition "$PREVIOUS_BACKEND_TD_ARN"

          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --services "${{ vars.ECS_FRONTEND_SERVICE_NAME }}" "${{ vars.ECS_BACKEND_SERVICE_NAME }}"

      - name: Fail workflow after rollback
        if: steps.wait_stable.outcome == 'failure'
        run: |
          echo "Deployment failed to stabilize and was rolled back to previous task definitions."
          exit 1
